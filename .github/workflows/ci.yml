name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  plugin:
    name: Plugin demo (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ulanzi-demos/plugins/demo/io.zentala.ulanzideck.demo.ulanziPlugin
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test

  usb-demo:
    name: USB demo (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ulanzi-demos/usb/demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: pip install pytest pytest-cov
      - run: pytest
