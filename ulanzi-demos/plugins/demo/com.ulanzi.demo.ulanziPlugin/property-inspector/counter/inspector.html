<!DOCTYPE html>
<!--
  Property Inspector: Counter Action
  Configures step size, direction, and display colors for the counter.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Counter Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; font-size: 13px; color: #cdd9e5; background: #1c2128; padding: 12px; }
    label { display: block; margin-bottom: 4px; color: #8b949e; }
    .field { margin-bottom: 12px; }
    input[type="number"], select {
      width: 100%; padding: 6px 8px; border: 1px solid #30363d;
      border-radius: 4px; background: #0d1117; color: #cdd9e5; font-size: 13px;
    }
    input[type="color"] { width: 100%; height: 32px; border: 1px solid #30363d; border-radius: 4px; background: #0d1117; cursor: pointer; padding: 2px; }
    .btn-row { display: flex; gap: 8px; }
    button { flex: 1; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn-save  { background: #238636; color: #fff; }
    .btn-save:hover  { background: #2ea043; }
    .btn-reset { background: #6e3a3a; color: #f85149; }
    .btn-reset:hover { background: #8a4a4a; }
  </style>
</head>
<body>
  <div class="field">
    <label for="step">Step (1–100)</label>
    <input type="number" id="step" min="1" max="100" value="1" />
  </div>

  <div class="field">
    <label for="direction">Direction</label>
    <select id="direction">
      <option value="increment">Increment</option>
      <option value="decrement">Decrement</option>
    </select>
  </div>

  <div class="field">
    <label for="bgColor">Background Color</label>
    <input type="color" id="bgColor" value="#1a1a2e" />
  </div>

  <div class="field">
    <label for="incrementColor">Positive Color</label>
    <input type="color" id="incrementColor" value="#39d353" />
  </div>

  <div class="field">
    <label for="decrementColor">Negative Color</label>
    <input type="color" id="decrementColor" value="#f85149" />
  </div>

  <div class="btn-row">
    <button class="btn-reset" id="btnReset">Reset</button>
    <button class="btn-save"  id="btnSave">Save</button>
  </div>

  <script src="../../plugin/libs/js/constants.js"></script>
  <script src="../../plugin/libs/js/eventEmitter.js"></script>
  <script src="../../plugin/libs/js/timers.js"></script>
  <script src="../../plugin/libs/js/utils.js"></script>
  <script src="../../plugin/libs/js/ulanzideckApi.js"></script>
  <script>
    $UD.connect('com.ulanzi.demo.counter');

    $UD.onParamFromPlugin(jsn => {
      if (!jsn || !jsn.param) return;
      const p = jsn.param;
      if (p.step !== undefined)
        document.getElementById('step').value = p.step;
      if (p.direction)
        document.getElementById('direction').value = p.direction;
      if (p.bgColor)
        document.getElementById('bgColor').value = p.bgColor;
      if (p.incrementColor)
        document.getElementById('incrementColor').value = p.incrementColor;
      if (p.decrementColor)
        document.getElementById('decrementColor').value = p.decrementColor;
    });

    document.getElementById('btnSave').addEventListener('click', () => {
      $UD.sendParamFromPlugin({
        step:           parseInt(document.getElementById('step').value, 10) || 1,
        direction:      document.getElementById('direction').value,
        bgColor:        document.getElementById('bgColor').value,
        incrementColor: document.getElementById('incrementColor').value,
        decrementColor: document.getElementById('decrementColor').value,
      });
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      $UD.sendParamFromPlugin({ action: 'reset' });
    });
  </script>
</body>
</html>
