<!DOCTYPE html>
<!--
  Property Inspector: CPU Status Action
  Configures alert threshold, update interval, and core count display.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CPU Status Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; font-size: 13px; color: #cdd9e5; background: #1c2128; padding: 12px; }
    label { display: block; margin-bottom: 4px; color: #8b949e; }
    .field { margin-bottom: 12px; }
    select {
      width: 100%; padding: 6px 8px; border: 1px solid #30363d;
      border-radius: 4px; background: #0d1117; color: #cdd9e5; font-size: 13px;
    }
    input[type="range"] { width: 100%; }
    .range-row { display: flex; align-items: center; gap: 8px; }
    .range-value { min-width: 32px; text-align: right; color: #cdd9e5; }
    input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    .checkbox-row { display: flex; align-items: center; gap: 8px; }
    button { width: 100%; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn-save { background: #238636; color: #fff; }
    .btn-save:hover { background: #2ea043; }
  </style>
</head>
<body>
  <div class="field">
    <label for="alertThreshold">Alert Threshold (%)</label>
    <div class="range-row">
      <input type="range" id="alertThreshold" min="50" max="95" step="5" value="80" />
      <span class="range-value" id="thresholdDisplay">80%</span>
    </div>
  </div>

  <div class="field">
    <label for="intervalSec">Update Interval (s)</label>
    <select id="intervalSec">
      <option value="1">1 second</option>
      <option value="2" selected>2 seconds</option>
      <option value="5">5 seconds</option>
    </select>
  </div>

  <div class="field">
    <div class="checkbox-row">
      <input type="checkbox" id="showCores" checked />
      <label for="showCores" style="margin:0">Show Core Count</label>
    </div>
  </div>

  <button class="btn-save" id="btnSave">Save</button>

  <script src="../../libs/plugin-common-html/index.js"></script>
  <script>
    const api = window.$PI;
    const thresholdInput   = document.getElementById('alertThreshold');
    const thresholdDisplay = document.getElementById('thresholdDisplay');

    thresholdInput.addEventListener('input', () => {
      thresholdDisplay.textContent = `${thresholdInput.value}%`;
    });

    api.onDidReceiveSettings((_actionUUID, _context, settings) => {
      if (!settings) return;
      if (settings.alertThreshold !== undefined) {
        thresholdInput.value = settings.alertThreshold;
        thresholdDisplay.textContent = `${settings.alertThreshold}%`;
      }
      if (settings.intervalSec !== undefined)
        document.getElementById('intervalSec').value = settings.intervalSec;
      if (settings.showCores !== undefined)
        document.getElementById('showCores').checked = settings.showCores;
    });

    document.getElementById('btnSave').addEventListener('click', () => {
      const payload = {
        alertThreshold: parseInt(thresholdInput.value, 10),
        intervalSec:    parseInt(document.getElementById('intervalSec').value, 10),
        showCores:      document.getElementById('showCores').checked,
      };
      api.sendToPlugin(payload);
    });
  </script>
</body>
</html>
