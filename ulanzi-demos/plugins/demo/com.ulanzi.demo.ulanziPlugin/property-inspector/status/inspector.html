<!DOCTYPE html>
<!--
  Property Inspector: CPU Status Action
  Configures CPU/temp thresholds, update interval, and LHM port.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CPU Status Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; font-size: 13px; color: #cdd9e5; background: #1c2128; padding: 12px; }
    label { display: block; margin-bottom: 4px; color: #8b949e; }
    .field { margin-bottom: 12px; }
    select, input[type="number"] {
      width: 100%; padding: 6px 8px; border: 1px solid #30363d;
      border-radius: 4px; background: #0d1117; color: #cdd9e5; font-size: 13px;
    }
    input[type="range"] { width: 100%; }
    .range-row { display: flex; align-items: center; gap: 8px; }
    .range-value { min-width: 40px; text-align: right; color: #cdd9e5; }
    button { width: 100%; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn-save { background: #238636; color: #fff; }
    .btn-save:hover { background: #2ea043; }
    .hint { font-size: 11px; color: #8b949e; margin-top: 4px; }
    h4 { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px;
         margin: 14px 0 8px; border-bottom: 1px solid #30363d; padding-bottom: 4px; }
  </style>
</head>
<body>
  <h4>CPU Alert</h4>

  <div class="field">
    <label for="cpuThreshold">CPU Load Alert (%)</label>
    <div class="range-row">
      <input type="range" id="cpuThreshold" min="50" max="100" step="5" value="90" />
      <span class="range-value" id="cpuThresholdDisplay">90%</span>
    </div>
  </div>

  <h4>Temperature Alert</h4>

  <div class="field">
    <label for="tempThreshold">Temp Alert (°C)</label>
    <div class="range-row">
      <input type="range" id="tempThreshold" min="60" max="105" step="5" value="85" />
      <span class="range-value" id="tempThresholdDisplay">85°C</span>
    </div>
  </div>

  <div class="field">
    <label for="lhmPort">LibreHardwareMonitor Port</label>
    <input type="number" id="lhmPort" value="8085" min="1" max="65535" />
    <p class="hint">Start LHM → Options → Remote Web Server. Default port: 8085.</p>
  </div>

  <h4>General</h4>

  <div class="field">
    <label for="intervalSec">Update Interval (s)</label>
    <select id="intervalSec">
      <option value="2">2 seconds</option>
      <option value="3" selected>3 seconds</option>
      <option value="5">5 seconds</option>
      <option value="10">10 seconds</option>
    </select>
  </div>

  <button class="btn-save" id="btnSave">Save</button>

  <script src="../../plugin/libs/js/constants.js"></script>
  <script src="../../plugin/libs/js/eventEmitter.js"></script>
  <script src="../../plugin/libs/js/timers.js"></script>
  <script src="../../plugin/libs/js/utils.js"></script>
  <script src="../../plugin/libs/js/ulanzideckApi.js"></script>
  <script>
    $UD.connect('com.ulanzi.ulanzideck.demo.status');

    const cpuInput  = document.getElementById('cpuThreshold');
    const cpuDisp   = document.getElementById('cpuThresholdDisplay');
    const tempInput = document.getElementById('tempThreshold');
    const tempDisp  = document.getElementById('tempThresholdDisplay');

    cpuInput.addEventListener('input',  () => { cpuDisp.textContent  = `${cpuInput.value}%`;   });
    tempInput.addEventListener('input', () => { tempDisp.textContent = `${tempInput.value}°C`; });

    $UD.onParamFromPlugin(jsn => {
      if (!jsn || !jsn.param) return;
      const p = jsn.param;
      if (p.cpuThreshold !== undefined) {
        cpuInput.value = p.cpuThreshold;
        cpuDisp.textContent = `${p.cpuThreshold}%`;
      }
      if (p.tempThreshold !== undefined) {
        tempInput.value = p.tempThreshold;
        tempDisp.textContent = `${p.tempThreshold}°C`;
      }
      if (p.intervalSec !== undefined)
        document.getElementById('intervalSec').value = p.intervalSec;
      if (p.lhmPort !== undefined)
        document.getElementById('lhmPort').value = p.lhmPort;
    });

    document.getElementById('btnSave').addEventListener('click', () => {
      $UD.sendParamFromPlugin({
        cpuThreshold:  parseInt(cpuInput.value, 10),
        tempThreshold: parseInt(tempInput.value, 10),
        intervalSec:   parseInt(document.getElementById('intervalSec').value, 10),
        lhmPort:       parseInt(document.getElementById('lhmPort').value, 10),
      });
    });
  </script>
</body>
</html>
